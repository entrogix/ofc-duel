name: CI

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    shell: bash

jobs:
  shared-tests:
    name: Shared — unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: packages/shared
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/shared/package-lock.json
      - run: npm ci
        working-directory: packages/shared
      - run: npx tsx --test test/*.test.ts
        working-directory: packages/shared

  server-check:
    name: Server — tsc + smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            packages/shared
            packages/server
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/server/package-lock.json
      - run: npm ci
        working-directory: packages/server
      - run: npx tsc --noEmit
        working-directory: packages/server
      - name: Start server
        run: npm start &
        working-directory: packages/server
      - run: sleep 2 && npx tsx src/smoke_test.ts
        working-directory: packages/server

  app-typecheck:
    name: App — tsc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            packages/shared
            packages/app
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/app/package-lock.json
      - run: npm ci
        working-directory: packages/app
      - run: npx tsc --noEmit
        working-directory: packages/app